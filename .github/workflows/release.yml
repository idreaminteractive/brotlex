name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-natives:
    name: Build NIF (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build NIF
        working-directory: native/brotlex
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package NIF tarballs
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          TARGET="${{ matrix.target }}"
          SRC="native/brotlex/target/${TARGET}/release/libbrotlex.so"

          if [ ! -f "$SRC" ]; then
            echo "ERROR: $SRC not found"
            ls -la "native/brotlex/target/${TARGET}/release/"
            exit 1
          fi

          STAGING=$(mktemp -d)
          mkdir -p dist

          for NIF_VERSION in 2.15 2.16 2.17; do
            # The file INSIDE the tar must match what RustlerPrecompiled expects to extract
            NIF_FILENAME="libbrotlex-v${VERSION}-nif-${NIF_VERSION}-${TARGET}.so"
            TARBALL="dist/${NIF_FILENAME}.tar.gz"

            cp "$SRC" "${STAGING}/${NIF_FILENAME}"
            tar -czf "${TARBALL}" -C "${STAGING}" "${NIF_FILENAME}"
            rm "${STAGING}/${NIF_FILENAME}"

            echo "Packaged: ${TARBALL}"
          done

      - name: Upload tarballs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nif-${{ matrix.target }}
          path: dist/*.tar.gz
          retention-days: 1

  publish:
    name: Upload release assets and generate checksums
    needs: build-natives
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download all NIF artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nif-*
          merge-multiple: true
          path: dist/

      - name: List tarballs
        run: ls -la dist/

      - name: Create GitHub Release if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          if ! gh release view "${TAG}" &>/dev/null; then
            gh release create "${TAG}" --title "${TAG}" --generate-notes
          fi

      # Checksums are computed from LOCAL files BEFORE uploading.
      # This guarantees the hash matches exactly what the release will serve —
      # no re-download, no possibility of a race with --clobber changing the bytes.
      - name: Generate checksum file from local tarballs
        run: |
          set -euo pipefail

          {
            echo '%{'
            first=true
            for f in $(ls dist/*.tar.gz | sort); do
              BASENAME="$(basename "$f")"
              SHA=$(sha256sum "$f" | awk '{print $1}')
              if [ "$first" = true ]; then
                first=false
              else
                printf ',\n'
              fi
              printf '  "%s" => "sha256:%s"' "$BASENAME" "$SHA"
            done
            printf '\n'
            echo '}'
          } > checksum-Elixir.Brotlex.Native.exs

          echo "--- checksum-Elixir.Brotlex.Native.exs ---"
          cat checksum-Elixir.Brotlex.Native.exs

      - name: Upload tarballs to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" dist/*.tar.gz --clobber

      - name: Commit checksum file and move tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add checksum-Elixir.Brotlex.Native.exs
          git diff --staged --quiet && echo "Checksum file unchanged, skipping." && exit 0
          git commit -m "Update NIF checksums for ${{ github.ref_name }}"
          git push origin main

          # Force-move the tag to this commit so consumers get the checksum file
          TAG="${{ github.ref_name }}"
          git tag -f "${TAG}"
          git push origin "${TAG}" --force
