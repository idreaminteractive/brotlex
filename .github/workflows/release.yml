name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-natives:
    name: Build NIF (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # Linux aarch64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build NIF
        working-directory: native/brotlex
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package NIF binary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARGET="${{ matrix.target }}"
          RELEASE_DIR="native/brotlex/target/${TARGET}/release"
          SRC_FILE="${RELEASE_DIR}/libbrotlex.so"

          if [ ! -f "$SRC_FILE" ]; then
            echo "ERROR: Could not find compiled NIF binary"
            ls -la "${RELEASE_DIR}/"
            exit 1
          fi

          # RustlerPrecompiled expects the file inside the tarball to be named:
          #   libbrotlex-v<VERSION>-nif-<NIF_VERSION>-<TARGET>.so
          STAGING_DIR=$(mktemp -d)

          for NIF_VERSION in 2.15 2.16 2.17; do
            NIF_NAME="libbrotlex-v${VERSION}-nif-${NIF_VERSION}-${TARGET}.so"
            TARBALL="${NIF_NAME}.tar.gz"

            cp "${SRC_FILE}" "${STAGING_DIR}/${NIF_NAME}"
            tar -czf "${TARBALL}" -C "${STAGING_DIR}" "${NIF_NAME}"
            rm "${STAGING_DIR}/${NIF_NAME}"

            echo "Created: ${TARBALL}"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nif-${{ matrix.target }}
          path: "*.tar.gz"
          retention-days: 1

  publish-release:
    name: Publish GitHub Release
    needs: build-natives
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all NIF artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nif-*
          merge-multiple: true
          path: artifacts/

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"

          # Create the release if it doesn't exist yet
          if ! gh release view "${TAG}" &>/dev/null; then
            gh release create "${TAG}" \
              --title "${TAG}" \
              --generate-notes
          fi

          # Upload all NIF tarballs
          gh release upload "${TAG}" artifacts/*.tar.gz --clobber

  update-checksums:
    name: Generate checksums and update tag
    needs: publish-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"

      - name: Generate checksum file
        run: |
          mix deps.get
          mix rustler_precompiled.download Brotlex.Native --all --print
          echo "--- Generated checksum file ---"
          cat checksum-Elixir.Brotlex.Native.exs

      - name: Commit checksum file to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add checksum-Elixir.Brotlex.Native.exs
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update NIF checksums for ${{ github.ref_name }}"
          git push origin main

      - name: Move tag to include checksum file
        run: |
          TAG="${{ github.ref_name }}"
          git tag -f "${TAG}"
          git push origin "${TAG}" --force
